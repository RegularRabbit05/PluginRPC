name: Build and Release PluginRPC

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          go mod tidy
          go build -o PluginRPC .

      - name: Compute release metadata
        id: meta
        run: |
          echo "date_name=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "tag_name=build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.meta.outputs.date_name }}" \
            --notes "Automated release for run #${{ github.run_number }}" \
            ./PluginRPC
