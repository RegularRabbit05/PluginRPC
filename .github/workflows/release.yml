name: Build and Release PluginRPC

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -o PluginRPC .
          GOOS=linux GOARCH=arm64 go build -o PluginRPC.linux-arm64 .
          GOOS=linux GOARCH=ppc64le go build -o PluginRPC.linux-ppc64le .
          GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -o PluginRPC.linux-mipsle .
          GOOS=linux GOARCH=mips GOMIPS=softfloat go build -o PluginRPC.linux-mips .
          GOOS=windows GOARCH=amd64 go build -o PluginRPC.exe .
          GOOS=windows GOARCH=arm64 go build -o PluginRPC.windows-arm64.exe .

      - name: Compute release metadata
        id: meta
        run: |
          echo "date_name=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "tag_name=build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.date_name }}
          generate_release_notes: true
          body: |
            Automated release for run #${{ github.run_number }}
            ${{ github.event.head_commit.message }}
          files: |
            ./PluginRPC
            ./PluginRPC.linux-arm64
            ./PluginRPC.linux-ppc64le
            ./PluginRPC.linux-mipsle
            ./PluginRPC.linux-mips
            ./PluginRPC.exe
            ./PluginRPC.windows-arm64.exe
